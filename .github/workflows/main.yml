name: CI/CD MLflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"
  TARGET_VAR: "Credit_Score"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Tambahkan semua library yang dibutuhkan script training Anda di sini
          pip install mlflow pandas scikit-learn numpy 

      - name: Run mlflow project
        run: |
          # Menjalankan training untuk menghasilkan folder mlruns
          mlflow run MLproject --env-manager=local 

      - name: Get latest MLflow run_id
        run: |
          # Mengambil Run ID terbaru menggunakan Python API agar lebih akurat
          RUN_ID=$(python -c "import mlflow; print(mlflow.search_runs().iloc[0]['run_id'])")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      - name: Build Docker Model
        run: |
          # Build image 'cc' menggunakan metadata dari mlruns
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "cc" 

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push to Docker Hub
        run: |
          # Tag dan Push ke Docker Hub
          docker tag cc ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
