name: CI/CD MLflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with LFS
        uses: actions/checkout@v4
        with:
          lfs: true # Wajib jika menyimpan dataset/model di LFS

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn numpy joblib

      - name: Run training
        run: |
          # Menjalankan script modelling langsung untuk menghasilkan model.pkl
          python MLproject/modelling.py

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker
        run: |
          # Build menggunakan Dockerfile kustom Anda (lebih ringan)
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest .
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/cc:latest
